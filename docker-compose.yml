version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    volumes:
      - ./extraction.db:/app/extraction.db
      - ./databases:/app/databases
      - ./uploads:/app/uploads
      - ./email_logs:/app/email_logs
    restart: unless-stopped

volumes: {}
