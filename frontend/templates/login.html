<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DataExtract</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
    .login-wrap { width:100%; max-width:400px; padding:24px 16px; }
    .login-logo { text-align:center; margin-bottom:32px; }
    .login-logo .logo-icon { font-size:2.5rem; display:block; margin-bottom:8px; }
    .login-logo .logo-name { font-size:1.5rem; font-weight:800; color:var(--text); }
    .login-logo .logo-sub  { font-size:0.8rem; color:var(--text-muted); margin-top:2px; }
    .login-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:32px; box-shadow:var(--shadow-md); }
    .login-card h2 { font-size:1.15rem; font-weight:700; margin-bottom:6px; }
    .login-card p  { font-size:0.85rem; color:var(--text-muted); margin-bottom:24px; }
    .login-btn { width:100%; padding:12px; font-size:1rem; justify-content:center; margin-top:8px; }
    .login-error { display:none; margin-top:12px; }
    .login-footer { text-align:center; margin-top:20px; font-size:0.78rem; color:var(--text-muted); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <span class="logo-icon">⚡</span>
    <div class="logo-name">DataExtract</div>
    <div class="logo-sub">Universal Extraction Platform</div>
  </div>

  <div class="login-card">
    <h2>Superadmin Login</h2>
    <p>Sign in to manage clients, API keys, and platform settings.</p>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <button class="btn btn-primary login-btn" id="loginBtn" onclick="doLogin()">
      Sign In
    </button>

    <div id="loginError" class="alert alert-error login-error"></div>
  </div>

  <div class="login-footer">
    Default credentials: <code>admin</code> / <code>admin123</code> — change in <code>.env</code>
  </div>
</div>

<div id="toast-container"></div>
<script src="/static/js/app.js"></script>
<script src="/static/js/login.js"></script>
</body>
</html>
